services:
  - type: web
    name: smart-resource-allocation
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python migrate.py && python seed_prod.py && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # DATABASE_URL must be set manually in Render dashboard
      # Use your Supabase Shared Pooler connection string:
      # postgresql://postgres.[ref]:[password]@aws-1-ap-south-1.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://smart-resource-allocation.vercel.app
      - key: ADMIN_EMAIL
        value: admin@smartalloc.org
      # ADMIN_PASSWORD must be set manually — do NOT use the default
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: Platform Admin
      # ── Email / SMTP (optional but recommended) ──────────────────────────
      # Leave SMTP_HOST empty to disable email (reset links print to Render logs instead)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: noreply@smartalloc.org
      - key: EMAIL_FROM_NAME
        value: Smart Resource Allocation
      - key: PYTHON_VERSION
        value: 3.11.9
